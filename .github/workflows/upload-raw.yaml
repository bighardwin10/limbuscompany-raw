name: 每周提取边狱巴士语言文件并推送到 master 分支

on:
  schedule:
    - cron: '0 4 * * 4'   # 北京时间每周四 12:00
  workflow_dispatch:

jobs:
  extract-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许推送到仓库

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # 获取完整历史，以便后续推送

      - name: 清理磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo apt-get clean
          docker system prune -af

      - name: 安装 SteamCMD
        uses: buildalon/setup-steamcmd@v1

      - name: 安装边狱巴士到 ./game
        run: |
          mkdir -p ./game
          # 重要：+force_install_dir 必须在 +login 之前
          steamcmd +force_install_dir "$(pwd)/game" \
                    +login ${{ secrets.STEAM_NAME }} ${{ secrets.STEAM_PASSWORD }} \
                    +app_update 1973530 validate \
                    +quit

      - name: 提取 Localize 目录到仓库
        run: |
          SOURCE_DIR="./game/LimbusCompany_Data/Assets/Resources_moved/Localize"
          TARGET_DIR="./LimbusCompany_Localize"   # 仓库内的目标目录，可自行修改
          if [ -d "$SOURCE_DIR" ]; then
            # 先清空旧目录，保证完全同步
            rm -rf "$TARGET_DIR"
            mkdir -p "$TARGET_DIR"
            cp -r "$SOURCE_DIR"/* "$TARGET_DIR"/
            echo "文件已复制到 $TARGET_DIR"
            ls -la "$TARGET_DIR"
          else
            echo "错误：未找到 Localize 目录，请检查游戏安装路径"
            exit 1
          fi

      - name: 推送到 master 分支
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 确保在 master 分支上操作
          git checkout master
          # 添加所有变更
          git add ./LimbusCompany_Localize
          # 只有有变更时才提交
          if git diff --staged --quiet; then
            echo "没有文件变化，跳过提交"
          else
            git commit -m "auto: 更新边狱巴士语言文件 $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin master
          fi